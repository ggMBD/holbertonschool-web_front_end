<!DOCTYPE html>
<html lang="en" dir="ltr">

    <head>

        <meta charset="utf-8" />
        <title>Task 4</title>
        <script src="https://code.jquery.com/jquery-4.0.0.slim.min.js" integrity="sha256-8DGpv13HIm+5iDNWw1XqxgFB4mj+yOKFNb+tHBZOowc=" crossorigin="anonymous"></script>
        <script type="application/javascript">
            function createFamilyTree() {
                $("body").append(
                    $("<table>").append(
                        $("<thead>").append(
                            $("<tr>").append(
                                $("<th>").text("Firstname"),
                                $("<th>").text("Lastname")
                            )
                        ),
                        $("<tbody>").append(
                            $("<tr>").append(
                                $("<td>").text("Guillaume"),
                                $("<td>").text("Salva")
                            ),
                            $("<tr>").append(
                                $("<td>").text("Paulette"),
                                $("<td>").text("Salva")
                            ),
                            $("<tr>").append(
                                $("<td>").text("Antoine"),
                                $("<td>").text("Salva")
                            )
                        )
                    )
                );                
            };
            function replaceFamilyTree(){
                $("tbody").html(
                    $("<tr>").append(
                        $("<td>").text("Gerard"),
                        $("<td>").text("Bonissa")
                    )
                );
            };
            $(function() {createFamilyTree();});
            $(function() {replaceFamilyTree();});
        </script>
    </head>

</html>
