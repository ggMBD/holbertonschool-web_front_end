        <script type="application/javascript">
            function createFamilyTree() {
                let table = $("<table>");
                let tableHead = $("<thead>");
                let tableBody = $("<tbody>");

                let headRow = $("<tr>");
                headRow.append($("<th>").text("Firstname"));
                headRow.append($("<th>").text("Lastname"));
                tableHead.append(headRow);

                let row1 = $("<tr>")
                    .append($("<td>").text("Guillaume"))
                    .append($("<td>").text("Salva"));

                let row2 = $("<tr>")
                    .append($("<td>").text("Paulette"))
                    .append($("<td>").text("Salva"));

                let row3 = $("<tr>")
                    .append($("<td>").text("Antoine"))
                    .append($("<td>").text("Salva"));

                tableBody.append(row1, row2, row3);
                table.append(tableHead, tableBody);
                $("body").append(table);
                }
            $(document).ready(createFamilyTree);
        </script>
    </head>
