        <script type="application/javascript">
            function createFamilyTree(){
                $("body").append(

                                $("<th>").text("Lastname"),
                            )
                        ),
                        $("<tbody>")
                    )
                );
            };

            function addNewMember(firstName, lastName){
                $("table tbody").append(
                    $("<tr>").append(
                        $("<td>").text(firstName),
                        $("<td>").text(lastName),
                        $("<td>").text("(x)")
                            .css("background-color", "orange")
                            .click(function() {
                                $(this).parent().remove();
                            })
                    )
                );
            };
            $(function() {createFamilyTree(); });
